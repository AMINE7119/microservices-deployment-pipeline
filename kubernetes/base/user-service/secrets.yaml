apiVersion: v1
kind: Secret
metadata:
  name: user-service-secrets
  labels:
    app: user-service
type: Opaque
data:
  # Replace with your own base64-encoded values: echo -n 'your-value' | base64
  database-url: REPLACE_WITH_BASE64_ENCODED_DATABASE_URL
  jwt-secret: REPLACE_WITH_BASE64_ENCODED_JWT_SECRET